    <!-- Lazy loading script for images -->
    <script>
      if ('loading' in HTMLImageElement.prototype) {
        // Native lazy loading is supported
      } else {
        // Fallback for browsers che don't support native lazy loading
        const images = document.querySelectorAll('img[loading="lazy"]');
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.src = entry.target.dataset.src;
              observer.unobserve(entry.target);
            }
          });
        });
        images.forEach(img => imageObserver.observe(img));
      }
    </script>
    <script>
      function toggleMenu() {
        const menuIcon = document.querySelector(".menu-icon");
        const trigger = document.querySelector(".site-nav .trigger");
        menuIcon.classList.toggle("active");
        trigger.classList.toggle("active");
      }
      
      // Close menu when clicking outside
      document.addEventListener("click", function(event) {
        const nav = document.querySelector(".site-nav");
        const menuIcon = document.querySelector(".menu-icon");
        if (!nav.contains(event.target)) {
          menuIcon.classList.remove("active");
          document.querySelector(".site-nav .trigger").classList.remove("active");
        }
      });
    </script>
